<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearPath Edu Hub - Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="text-center bg-white rounded-xl shadow-2xl p-8 max-w-md w-full">
        <div class="flex items-center justify-center mb-6">
            <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3" />
                </svg>
            </div>
        </div>
        <h1 class="text-2xl font-bold text-slate-800 mb-4">You're Offline</h1>
        <p class="text-slate-600 mb-6">
            It looks like you've lost your internet connection. 
            You can still access some cached content, but for the full experience, 
            please reconnect to the internet.
        </p>
        <div class="space-y-4">
            <div class="flex items-center justify-between p-4 bg-blue-50 rounded-lg">
                <span class="text-slate-600">Cached Pages Available</span>
                <span class="font-bold text-blue-600">Home, Login, Portals</span>
            </div>
            <div class="flex items-center justify-between p-4 bg-blue-50 rounded-lg">
                <span class="text-slate-600">Limited Functionality</span>
                <span class="font-bold text-blue-600">View Only</span>
            </div>
        </div>
        <button 
            onclick="window.location.reload()"
            class="w-full btn-primary py-3"
        >
            Try Again
        </button>
    </div>
</body>
</html>
